# Root nixpacks.toml - defaults to backend service
# For monorepo: create separate services with Root Directory set to "backend" or "frontend"

[phases.setup]
nixPkgs = ["nodejs-18_x"]

[phases.install]
cmds = ["cd backend && npm ci || npm install"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "cd backend && npm start"
