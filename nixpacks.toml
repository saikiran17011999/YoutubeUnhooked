# This file is for the root - Railway should use subdirectory services
# For monorepo setup, create separate services with root directories:
# - Backend service: root = "backend"
# - Frontend service: root = "frontend"

[phases.setup]
nixPkgs = ["nodejs-18_x"]

[phases.install]
cmds = ["cd backend && npm install"]

[phases.build]
cmds = ["cd backend && npm run build || true"]

[start]
cmd = "cd backend && npm start"
